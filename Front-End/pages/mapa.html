<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - SolarMap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <aside class="sidebar">
        <div class="profile-container">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-panel">
                <div class="profile-panel-header">
                    <i class="fas fa-user-circle"></i>
                    <div class="profile-panel-info">
            <div class="profile-panel-name" id="user-name">Carregando...</div>
            <div class="profile-panel-email" id="user-email">...</div>
                    </div>
                </div>
                <ul class="profile-panel-menu">
                    <li><a href="#"><i class="fas fa-user"></i>Meu Perfil</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i>Configurações</a></li>
                    <li><a href="#"><i class="fas fa-history"></i>Histórico</a></li>
                    <li><a href="#"><i class="fas fa-question-circle"></i>Ajuda</a></li>
                </ul>
        <div class="profile-panel-login" id="auth-login-section">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i>Login</a>
                </div>
        <div class="profile-panel-logout" id="auth-logout-section">
          <a href="#" id="logout-link"><i class="fas fa-sign-out-alt"></i>Sair</a>
                </div>
            </div>
        </div>
        <div class="menu">
            <a href="../index.html" data-label="Início"><i class="fas fa-home"></i></a>
            <a href="simulador.html" data-label="Simulador"><i class="fas fa-calculator"></i></a>
            <a href="mapa.html" class="mapa active" data-label="Mapa"><i class="fas fa-map"></i></a>
            <a href="dashboard.html" data-label="Dashboard"><i class="fas fa-chart-line"></i></a>
        </div>
    </aside>

    <main class="content">

        <h1>Mapa Solar</h1>
        <p>Visualize regiões com maior potencial solar</p>

        <div class="card">
            <div id="map"></div>
        </div>

        <div class="card">
            <h3>Dados da região</h3>
            <p><strong>Região:</strong> —</p>
            <p><strong>Irradiação:</strong> —</p>
            <p><strong>Potencial:</strong> —</p>
        </div>

    </main>

    <!-- ===== BOTÃO FLUTUANTE PARA PESQUISA DE CEP ===== -->
    <button class="floating-button" id="floating-cep-button" title="Pesquisar por CEP">
        <i class="fas fa-search"></i>
    </button>

    <!-- ===== MODAL DE PESQUISA DE CEP ===== -->
    <div class="modal-overlay" id="cep-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔍 Pesquisar por CEP</h2>
                <button class="modal-close" id="cep-modal-close">×</button>
            </div>
            <div class="cep-input-group">
                <input 
                    type="text" 
                    id="cep-input" 
                    placeholder="Digite o CEP (ex: 01310-100)" 
                    maxlength="9"
                >
                <button id="cep-search-button">Buscar</button>
            </div>
            <div id="cep-message" class="modal-message"></div>
        </div>
    </div>

    <!-- ===== PAINEL LATERAL DE ANÁLISE SOLAR ===== -->
    <div class="solar-panel" id="solar-panel">
        <div class="solar-panel-header">
            <div class="solar-panel-header-content">
                <h2>☀️ Análise Solar</h2>
                <p id="solar-location">Carregando local...</p>
            </div>
            <button class="solar-panel-close" id="solar-panel-close">×</button>
        </div>
        <div class="solar-panel-content" id="solar-panel-content">
            <!-- Conteúdo será preenchido dinamicamente -->
        </div>
    </div>

    <footer class="footer">
        <p>SolarMap</p>
    </footer>

    <!-- Scripts de Autenticação -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1JiPgRZcA7AhuY7poed4K0q1KUhQKTbE&libraries=places,visualization"></script>
    <script src="../assets/js/mapa.js"></script>
</body>

</html>
