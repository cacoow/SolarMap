<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SolarMap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <!-- Logo -->
            <div class="login-header">
                <object data="../assets/images/logo0.png" type="image/png" class="login-logo-svg"></object>
            </div>

            <!-- Formulário de CADASTRO -->
            <form class="login-form" id="signupForm">
                <!-- Nome Completo -->
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i> Nome Completo
                    </label>
                    <input type="text" id="fullName" name="fullName" placeholder="Seu nome" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <!-- Empresa/Organização (opcional) -->
                <div class="form-group">
                    <label for="company">
                        <i class="fas fa-building"></i> Empresa (opcional)
                    </label>
                    <input type="text" id="company" name="company" placeholder="Sua empresa">
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                    <small style="color: #888; font-size: 0.85em; margin-top: 5px; display: block;">
                        ℹ️ Use letras, números e caracteres especiais
                    </small>
                </div>

                <!-- Confirmar Senha -->
                <div class="form-group">
                    <label for="passwordConfirm">
                        <i class="fas fa-lock"></i> Confirmar Senha
                    </label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Repita sua senha" required>
                </div>

                <!-- Termos de Serviço -->
                <div class="form-check">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        Concordo com os <a href="termos.html" target="_blank">Termos de Serviço</a>
                    </label>
                </div>

                <!-- Mensagem de erro/sucesso -->
                <div id="message" class="message" style="display: none;"></div>

                <!-- Botão de Cadastro -->
                <button type="submit" class="btn-login" id="signupBtn">
                    <i class="fas fa-user-plus"></i> <span id="signupBtnText">Criar Conta</span>
                </button>
            </form>

            <!-- Links de Rodapé -->
            <div class="login-footer">
                <a href="login.html">Já tem uma conta? Faça login</a>
                <span class="divider">|</span>
                <a href="../index.html">Voltar para Início</a>
            </div>
        </div>

        <!-- Ilustração lateral (opcional) -->
        <div class="login-illustration">
            <div class="illustration-content">
                <i class="fas fa-solar-panel"></i>
                <h2>Junte-se ao SolarMap</h2>
                <p>Transforme energia solar em oportunidades de negócio</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/signup.js"></script>

</body>

</html>
