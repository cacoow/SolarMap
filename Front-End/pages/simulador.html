<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador - SolarMap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <aside class="sidebar">
        <div class="profile-container">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-panel">
                <div class="profile-panel-header">
                    <i class="fas fa-user-circle"></i>
                    <div class="profile-panel-info">
                        <div class="profile-panel-name">João Silva</div>
                        <div class="profile-panel-email">joao@example.com</div>
                    </div>
                </div>
                <ul class="profile-panel-menu">
                    <li><a href="#"><i class="fas fa-user"></i>Meu Perfil</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i>Configurações</a></li>
                    <li><a href="#"><i class="fas fa-history"></i>Histórico</a></li>
                    <li><a href="#"><i class="fas fa-question-circle"></i>Ajuda</a></li>
                </ul>
                <div class="profile-panel-login">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i>Login</a>
                </div>
                <div class="profile-panel-logout">
                    <a href="#"><i class="fas fa-sign-out-alt"></i>Sair</a>
                </div>
            </div>
        </div>
        <div class="menu">
            <a href="../index.html" data-label="Início"><i class="fas fa-home"></i></a>
            <a href="simulador.html" class="active" data-label="Simulador"><i class="fas fa-calculator"></i></a>
            <a href="mapa.html" class="mapa" data-label="Mapa"><i class="fas fa-map"></i></a>
            <a href="dashboard.html" data-label="Dashboard"><i class="fas fa-chart-line"></i></a>
        </div>
    </aside>

    <main class="content">

        <h1>Simulador Solar</h1>

        <div class="card">
            <h3>Simule sua economia</h3>

            <input type="number" placeholder="Conta de luz (R$)">
            <input type="number" placeholder="Tamanho do telhado (m²)">

            <br><br>
            <button class="btn">Calcular</button>
        </div>

    </main>

    <footer class="footer">
        <p>SolarMap</p>
    </footer>

    <script>
        // Profile panel toggle
        const profileIcon = document.querySelector('.profile-icon');
        const profilePanel = document.querySelector('.profile-panel');
        const profileContainer = document.querySelector('.profile-container');

        if (profileIcon && profilePanel) {
            profileIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                profilePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!profileContainer.contains(e.target)) {
                    profilePanel.classList.remove('active');
                }
            });

            const profileMenuLinks = document.querySelectorAll('.profile-panel-menu a, .profile-panel-logout a, .profile-panel-login a');
            profileMenuLinks.forEach(link => {
                link.addEventListener('click', () => {
                    profilePanel.classList.remove('active');
                });
            });
        }
    </script>

</body>

</html>
