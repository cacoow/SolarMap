<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <aside class="sidebar">
        <div class="profile-container">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-panel">
                <div class="profile-panel-header">
                    <i class="fas fa-user-circle"></i>
                    <div class="profile-panel-info">
                        <div class="profile-panel-name" id="user-name">Carregando...</div>
                        <div class="profile-panel-email" id="user-email">...</div>
                    </div>
                </div>
                <ul class="profile-panel-menu">
                    <li><a href="#"><i class="fas fa-user"></i>Meu Perfil</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i>Configurações</a></li>
                    <li><a href="#"><i class="fas fa-history"></i>Histórico</a></li>
                    <li><a href="#"><i class="fas fa-question-circle"></i>Ajuda</a></li>
                </ul>
                <div class="profile-panel-login" id="auth-login-section">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i>Login</a>
                </div>
                <div class="profile-panel-logout" id="auth-logout-section">
                    <a href="#" id="logout-link"><i class="fas fa-sign-out-alt"></i>Sair</a>
                </div>
            </div>
        </div>
        <div class="menu">
            <a href="../index.html" data-label="Início"><i class="fas fa-home"></i></a>
            <a href="simulador.html" data-label="Simulador"><i class="fas fa-calculator"></i></a>
            <a href="mapa.html" class="mapa" data-label="Mapa"><i class="fas fa-map"></i></a>
            <a href="dashboard.html" class="active" data-label="Dashboard"><i class="fas fa-chart-line"></i></a>
        </div>
    </aside>

    <main class="content">

        <h1>Dashboard de Impacto</h1>
        <p><i>Dados fictícios para demonstração</i></p>

        <div class="cards">
            <div class="card card-dashboard">
                <h3>Economia</h3>
                <p id="economia-value">R$ 187</p>
            </div>

            <div class="card card-mapa">
                <h3>Energia</h3>
                <p id="energia-value">320 kWh</p>
            </div>

            <div class="card card-simulador">
                <h3>CO₂</h3>
                <p id="co2-value">42 kg</p>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card">
                <canvas id="grafico-economia"></canvas>
            </div>
            <div class="card">
                <canvas id="grafico-energia"></canvas>
            </div>
        </div>

        <div class="card history-card">
            <h3>Histórico de simulações</h3>
            <ul id="simulation-history"></ul>
        </div>

    </main>

    <footer class="footer">
        <p>SolarMap</p>
    </footer>

    <!-- Scripts de Autenticação -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>

    <script src="../assets/js/dashboard.js"></script>
</body>

</html>
