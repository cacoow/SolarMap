<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SolarMap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <!-- Logo -->
            <div class="login-header">
                <div class="login-logo">☀️</div>
                <h1>SolarMap</h1>
                <p>Plataforma de Energia Solar</p>
            </div>

            <!-- Formulário -->
            <form class="login-form" action="#" method="POST">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <!-- Lembrar-me -->
                <div class="form-check">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Lembrar-me</label>
                </div>

                <!-- Botão de Login -->
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <!-- Links de Rodapé -->
            <div class="login-footer">
                <a href="#">Esqueceu sua senha?</a>
                <span class="divider">|</span>
                <a href="../index.html">Voltar para Início</a>
            </div>

            <!-- Sign Up -->
            <div class="signup-section">
                <p>Não tem uma conta? <a href="#" class="signup-link">Crie uma agora</a></p>
            </div>
        </div>

        <!-- Ilustração lateral (opcional) -->
        <div class="login-illustration">
            <div class="illustration-content">
                <i class="fas fa-solar-panel"></i>
                <h2>Bem-vindo ao SolarMap</h2>
                <p>Transforme energia solar em oportunidades de negócio</p>
            </div>
        </div>
    </div>

</body>

</html>
