<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SolarMap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <!-- Logo -->
            <div class="login-header">
                <object data="../assets/images/logo0.png" type="image/png" class="login-logo-svg"></object>
            </div>

            <!-- Formulário de LOGIN -->
            <form class="login-form" id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <!-- Lembrar-me -->
                <div class="form-check">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Lembrar-me</label>
                </div>

                <!-- Mensagem de erro/sucesso -->
                <div id="message" class="message" style="display: none;"></div>

                <!-- Botão de Login -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> <span id="loginBtnText">Entrar</span>
                </button>
            </form>

            <!-- Links de Rodapé -->
            <div class="login-footer">
                <a href="#" id="forgotPasswordLink">Esqueceu sua senha?</a>
                <span class="divider">|</span>
                <a href="../index.html">Voltar para Início</a>
            </div>

            <!-- Sign Up -->
            <div class="signup-section">
                <p>Não tem uma conta? <a href="signup.html" class="signup-link">Crie uma agora</a></p>
            </div>
        </div>

        <!-- Ilustração lateral (opcional) -->
        <div class="login-illustration">
            <div class="illustration-content">
                <i class="fas fa-solar-panel"></i>
                <h2>Bem-vindo ao SolarMap</h2>
                <p>Transforme energia solar em oportunidades de negócio</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/login.js"></script>

</body>

</html>
